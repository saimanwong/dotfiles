# PREFIX + I to install
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g allow-rename off
set -g allow-set-title on
set -sg escape-time 0
set -g extended-keys on
set -g extended-keys-format csi-u
set -g status-interval 1
set -g status-position top

# Pi Agentic Calm UI styling
set -g status-style 'fg=#7A828A,bg=#0D1117'
set -g status-justify absolute-centre
set -g status-left-length 24
set -g status-right-length 48
set -g status-left '#[fg=#0A0E14,bg=#95E6CB,bold] #{?client_prefix,PREFIX,#S} #[default]'
set -g status-right '#[fg=#C7C7C7,bg=#0D1117] #{?window_zoomed_flag,ZOOM ,}#H #[fg=#C7C7C7,bg=#2A3542,bold] %a %H:%M #[default]'
set -g window-status-separator ''
set -g window-status-format '#[fg=#7A828A] #I #{?#{m/r:^[⠋⠙⠹⠸⠼⠴⠦⠧⠇⠏],#{pane_title}},#{=1:pane_title} ,}#{window_name}#{?window_zoomed_flag, [Z],} '
set -g window-status-current-format '#[fg=#0A0E14,bg=#59C2FF,bold] #I #{?#{m/r:^[⠋⠙⠹⠸⠼⠴⠦⠧⠇⠏],#{pane_title}},#{=1:pane_title} ,}#{window_name}#{?window_zoomed_flag, [Z],} #[default]'
set -g window-status-last-style 'fg=#95E6CB'
set -g window-status-activity-style 'fg=#95E6CB,bg=#0D1117,bold'
set -g window-status-bell-style 'fg=#D7BA7D,bg=#0D1117,bold'
set -g message-style 'fg=#C7C7C7,bg=#2A3542'
set -g message-command-style 'fg=#C7C7C7,bg=#3A4A5C'
set -g mode-style 'fg=#0A0E14,bg=#95E6CB'

# Open new pane/window base on current directory
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Border configuration
set -g pane-border-style 'fg=#2A3542,bg=default'
set -g pane-active-border-style 'fg=#95E6CB,bg=default'
set -g pane-border-lines heavy

# Enable mouse mode
set -g mouse on

# Mouse configuration - prevent click from switching panes
# This allows text selection without changing focus
unbind -T root MouseDown1Pane
bind -T root MouseDown1Pane if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" "send-keys -M" ""

# Enter copy mode on drag without switching panes
unbind -T root MouseDrag1Pane
bind -T root MouseDrag1Pane if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" "send-keys -M" "copy-mode -M"

# Bell for notifications in other windows (e.g. opencode)
set -g visual-bell on
set -g bell-action other

# Clear per-window notification highlight when switching to that window
set-hook -g after-select-window "set-window-option -u window-status-style"
bind -T root MouseDown1Status select-window -t= \; set-window-option -u window-status-style

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
