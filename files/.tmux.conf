# PREFIX + I to install
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g allow-rename off
set -sg escape-time 0
set -g extended-keys on
set -g status-interval 1

# Ayu-inspired UI styling
set -g status-style 'fg=#5c6773,bg=#131721'
set -g status-justify absolute-centre
set -g status-left-length 24
set -g status-right-length 48
set -g status-left '#[fg=#0b0e14,bg=#95e6cb,bold] #{?client_prefix,PREFIX,#S} #[default]'
set -g status-right '#[fg=#e6e1cf,bg=#131721] #{?window_zoomed_flag,ZOOM ,}#H #[fg=#e6e1cf,bg=#4f637a,bold] %a %H:%M #[default]'
set -g window-status-separator ''
set -g window-status-format '#[fg=#5c6773] #I #W#{?window_zoomed_flag, [Z],} '
set -g window-status-current-format '#[fg=#e6e1cf,bg=#4f637a,bold] #I #W#{?window_zoomed_flag, [Z],} #[default]'
set -g window-status-last-style 'fg=#95e6cb'
set -g window-status-activity-style 'fg=#7c9bc0,bg=#131721,bold'
set -g window-status-bell-style 'fg=#7c9bc0,bg=#131721,bold'
set -g message-style 'fg=#e6e1cf,bg=#4f637a'
set -g message-command-style 'fg=#e6e1cf,bg=#68839e'
set -g mode-style 'fg=#0b0e14,bg=#59c2ff'

# Open new pane/window base on current directory
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Border configuration
set -g pane-border-style 'fg=#232834,bg=default'
set -g pane-active-border-style 'fg=#7c9bc0,bg=default'
set -g pane-border-lines heavy

# Enable mouse mode
set -g mouse on

# Mouse configuration - prevent click from switching panes
# This allows text selection without changing focus
unbind -T root MouseDown1Pane
bind -T root MouseDown1Pane if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" "send-keys -M" ""

# Enter copy mode on drag without switching panes
unbind -T root MouseDrag1Pane
bind -T root MouseDrag1Pane if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" "send-keys -M" "copy-mode -M"

# Bell for notifications in other windows (e.g. opencode)
set -g visual-bell on
set -g bell-action other

# Clear per-window notification highlight when switching to that window
set-hook -g after-select-window "set-window-option -u window-status-style"
bind -T root MouseDown1Status select-window -t= \; set-window-option -u window-status-style

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
