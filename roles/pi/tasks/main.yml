---

- name: Remove deprecated Pi Coding Agent npm package
  community.general.npm:
    name: "@mariozechner/pi-coding-agent"
    global: true
    state: absent

- name: Install Pi Coding Agent globally via npm
  community.general.npm:
    name: "@earendil-works/pi-coding-agent"
    global: true
    state: present

- name: Check installed Pi packages
  ansible.builtin.command: pi list
  register: pi_packages_list
  changed_when: false
  failed_when: false

- name: Install pi-subagents Pi package
  ansible.builtin.command: pi install npm:pi-subagents
  when: "'pi-subagents' not in pi_packages_list.stdout"

- name: Install pi-codex-fast Pi package
  ansible.builtin.command: pi install npm:pi-codex-fast
  when: "'pi-codex-fast' not in pi_packages_list.stdout"

- name: Ensure global Agent Skills directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.agents/skills"
    state: directory
    mode: '0755'

- name: Soft link shared skills directory into global Agent Skills directory
  ansible.builtin.file:
    src: "{{ playbook_dir }}/files/agent-config/skills"
    dest: "{{ ansible_facts.env.HOME }}/.agents/skills/agent-config"
    force: true
    state: link

- name: Ensure Pi agent config directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.pi/agent"
    state: directory
    mode: '0755'

- name: Gather Pi themes path info
  ansible.builtin.stat:
    path: "{{ ansible_facts.env.HOME }}/.pi/agent/themes"
    follow: false
  register: pi_themes_path

- name: Backup existing non-directory Pi themes path before symlinking
  ansible.builtin.command:
    cmd: >
      mv
      "{{ ansible_facts.env.HOME }}/.pi/agent/themes"
      "{{ ansible_facts.env.HOME }}/.pi/agent/themes.pre-shared-link.{{ ansible_facts['date_time']['epoch'] }}"
  when:
    - pi_themes_path.stat.exists
    - not (pi_themes_path.stat.isdir | default(false))
    - not (pi_themes_path.stat.islnk | default(false))

- name: Soft link shared Pi themes directory when no themes directory exists
  ansible.builtin.file:
    src: "{{ playbook_dir }}/files/agent-config/pi-themes"
    dest: "{{ ansible_facts.env.HOME }}/.pi/agent/themes"
    force: true
    state: link
  when: >
    not pi_themes_path.stat.exists or
    (not (pi_themes_path.stat.isdir | default(false)) and
    not (pi_themes_path.stat.islnk | default(false)))

- name: Gather Pi Ayu Calm theme path info
  ansible.builtin.stat:
    path: "{{ ansible_facts.env.HOME }}/.pi/agent/themes/ayu-calm.json"
    follow: false
  register: pi_ayu_calm_theme_path
  when:
    - pi_themes_path.stat.exists
    - pi_themes_path.stat.isdir | default(false)
    - not (pi_themes_path.stat.islnk | default(false))

- name: Backup existing Pi Ayu Calm theme before symlinking into existing themes directory
  ansible.builtin.command:
    cmd: >
      mv
      "{{ ansible_facts.env.HOME }}/.pi/agent/themes/ayu-calm.json"
      "{{ ansible_facts.env.HOME }}/.pi/agent/themes/ayu-calm.json.pre-shared-link.{{ ansible_facts['date_time']['epoch'] }}"
  when:
    - pi_themes_path.stat.exists
    - pi_themes_path.stat.isdir | default(false)
    - not (pi_themes_path.stat.islnk | default(false))
    - pi_ayu_calm_theme_path.stat.exists
    - not (pi_ayu_calm_theme_path.stat.islnk | default(false))

- name: Soft link shared Pi Ayu Calm theme into existing themes directory
  ansible.builtin.file:
    src: "{{ playbook_dir }}/files/agent-config/pi-themes/ayu-calm.json"
    dest: "{{ ansible_facts.env.HOME }}/.pi/agent/themes/ayu-calm.json"
    force: true
    state: link
  when:
    - pi_themes_path.stat.exists
    - pi_themes_path.stat.isdir | default(false)
    - not (pi_themes_path.stat.islnk | default(false))

- name: Ensure Pi settings include shared defaults
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        import json
        import os
        from pathlib import Path

        path = Path(os.environ["HOME"]) / ".pi" / "agent" / "settings.json"
        data = {}
        if path.exists() and path.read_text().strip():
            data = json.loads(path.read_text())

        defaults_path = Path(os.environ["PI_SETTINGS_DEFAULTS"])
        desired = json.loads(defaults_path.read_text())

        def merge(current, desired):
            changed = False
            for key, desired_value in desired.items():
                current_value = current.get(key)
                if isinstance(desired_value, dict):
                    if not isinstance(current_value, dict):
                        current_value = {}
                        current[key] = current_value
                        changed = True
                    if merge(current_value, desired_value):
                        changed = True
                elif isinstance(desired_value, list):
                    if not isinstance(current_value, list):
                        current[key] = list(desired_value)
                        changed = True
                    else:
                        for item in desired_value:
                            if item not in current_value:
                                current_value.append(item)
                                changed = True
                elif current_value != desired_value:
                    current[key] = desired_value
                    changed = True
            return changed

        if merge(data, desired):
            path.write_text(json.dumps(data, indent=2) + "\n")
            print("changed")
  register: pi_settings_defaults
  changed_when: '"changed" in pi_settings_defaults.stdout'
  environment:
    HOME: "{{ ansible_facts.env.HOME }}"
    PI_SETTINGS_DEFAULTS: "{{ playbook_dir }}/files/agent-config/pi-settings-defaults.json"

