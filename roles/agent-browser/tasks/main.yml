---

- name: Install agent-browser on MacOS
  ansible.builtin.package:
    name: agent-browser
    state: present
  register: result
  failed_when:
    - '"already installed" not in result.msg'
    - '"Package installed" not in result.msg'
    - result.msg != ""
  when: ansible_facts.os_family == 'Darwin'

- name: Download Chromium for agent-browser
  ansible.builtin.command:
    cmd: agent-browser install
  register: install_result
  changed_when: "'Already installed' not in install_result.stdout"
  failed_when: false

- name: Ensure agent-browser config directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.agent-browser"
    state: directory
    mode: '0755'

- name: Soft link agent-browser configuration
  ansible.builtin.file:
    src: "{{ playbook_dir }}/files/.agent-browser/config.json"
    dest: "{{ ansible_facts.env.HOME }}/.agent-browser/config.json"
    force: true
    state: link
