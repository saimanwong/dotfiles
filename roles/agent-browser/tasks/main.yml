---

- name: Install agent-browser on MacOS
  ansible.builtin.package:
    name: agent-browser
    state: latest
  register: result
  failed_when:
    - '"already installed" not in result.msg'
    - '"Package already upgraded" not in result.msg'
    - '"Package installed" not in result.msg'
    - result.msg != ""
  when: ansible_facts.os_family == 'Darwin'

- name: Download Chromium for agent-browser
  ansible.builtin.command:
    cmd: agent-browser install
  register: install_result
  changed_when: "'already installed' not in install_result.stdout"
  failed_when: false

- name: Ensure global Agent Skills directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.agents/skills"
    state: directory
    mode: '0755'

- name: Install agent-browser skill globally
  ansible.builtin.command:
    cmd: npx skills add vercel-labs/agent-browser --yes --global
  args:
    creates: "{{ ansible_facts.env.HOME }}/.agents/skills/agent-browser/SKILL.md"

- name: Update agent-browser skill globally
  ansible.builtin.command:
    cmd: npx skills update agent-browser --global --yes
  register: agent_browser_skill_update
  changed_when: "'Updated agent-browser' in agent_browser_skill_update.stdout"

- name: Ensure agent-browser config directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.agent-browser"
    state: directory
    mode: '0755'

- name: Soft link agent-browser configuration
  ansible.builtin.file:
    src: "{{ playbook_dir }}/files/.agent-browser/config.json"
    dest: "{{ ansible_facts.env.HOME }}/.agent-browser/config.json"
    force: true
    state: link
