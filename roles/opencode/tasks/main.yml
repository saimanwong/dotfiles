---

- name: Install opencode globally via npm
  ansible.builtin.command:
    cmd: npm install -g opencode-ai@latest
  register: result
  changed_when: "'added' in result.stdout or 'updated' in result.stdout"

- name: Install terminal-notifier on MacOS
  ansible.builtin.package:
    name: terminal-notifier
    state: present
  when: ansible_facts.os_family == 'Darwin'

- name: Ensure opencode config directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.config/opencode"
    state: directory
    mode: '0755'

- name: Soft link opencode configuration
  ansible.builtin.file:
    src: "{{ playbook_dir }}/files/opencode.json"
    dest: "{{ ansible_facts.env.HOME }}/.config/opencode/opencode.json"
    force: true
    state: link

- name: "Ensure {{ ansible_facts.env.HOME }}/.claude exists (shared config with Claude Code)"
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.claude"
    state: directory

- name: Soft link AGENTS.md for OpenCode (shared with Claude Code)
  ansible.builtin.file:
    src: "{{ playbook_dir }}/files/agent-config/AGENTS.md"
    dest: "{{ ansible_facts.env.HOME }}/.claude/AGENTS.md"
    force: true
    state: link

- name: Soft link CLAUDE.md for OpenCode (shared with Claude Code)
  ansible.builtin.file:
    src: "{{ playbook_dir }}/files/agent-config/CLAUDE.md"
    dest: "{{ ansible_facts.env.HOME }}/.claude/CLAUDE.md"
    force: true
    state: link

- name: Ensure opencode plugins directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.config/opencode/plugins"
    state: directory
    mode: '0755'

- name: Soft link opencode notify plugin
  ansible.builtin.file:
    src: "{{ playbook_dir }}/files/opencode-notify.js"
    dest: "{{ ansible_facts.env.HOME }}/.config/opencode/plugins/notify.js"
    force: true
    state: link

- name: Gather OpenCode commands path info
  ansible.builtin.stat:
    path: "{{ ansible_facts.env.HOME }}/.config/opencode/commands"
    follow: false
  register: opencode_commands_path

- name: Backup existing OpenCode commands path before symlinking
  ansible.builtin.command:
    cmd: >
      mv
      "{{ ansible_facts.env.HOME }}/.config/opencode/commands"
      "{{ ansible_facts.env.HOME }}/.config/opencode/commands.pre-shared-link.{{ ansible_facts['date_time']['epoch'] }}"
  when:
    - opencode_commands_path.stat.exists
    - not (opencode_commands_path.stat.islnk | default(false))

- name: Gather OpenCode skills path info
  ansible.builtin.stat:
    path: "{{ ansible_facts.env.HOME }}/.config/opencode/skills"
    follow: false
  register: opencode_skills_path

- name: Backup existing OpenCode skills path before symlinking
  ansible.builtin.command:
    cmd: >
      mv
      "{{ ansible_facts.env.HOME }}/.config/opencode/skills"
      "{{ ansible_facts.env.HOME }}/.config/opencode/skills.pre-shared-link.{{ ansible_facts['date_time']['epoch'] }}"
  when:
    - opencode_skills_path.stat.exists
    - not (opencode_skills_path.stat.islnk | default(false))

- name: Soft link shared OpenCode commands directory
  ansible.builtin.file:
    src: "{{ playbook_dir }}/files/agent-config/commands"
    dest: "{{ ansible_facts.env.HOME }}/.config/opencode/commands"
    force: true
    state: link

- name: Soft link shared OpenCode skills directory
  ansible.builtin.file:
    src: "{{ playbook_dir }}/files/agent-config/skills"
    dest: "{{ ansible_facts.env.HOME }}/.config/opencode/skills"
    force: true
    state: link

- name: Install agent-browser skill globally
  ansible.builtin.command:
    cmd: npx skills add vercel-labs/agent-browser --yes --global
  args:
    creates: "{{ ansible_facts.env.HOME }}/.agents/skills/agent-browser/SKILL.md"
