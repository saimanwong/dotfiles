---

- name: Install Claude Code CLI on MacOS
  ansible.builtin.package:
    name: claude-code
    state: present
  register: result
  failed_when:
    - '"already installed" not in result.msg'
    - '"Package installed" not in result.msg'
    - result.msg != ""
  when: ansible_facts.os_family == 'Darwin'

- name: "Ensure {{ ansible_facts.env.HOME }}/.claude exists"
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.claude"
    state: directory

- name: "Ensure {{ ansible_facts.env.HOME }}/.claude/commands exists"
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.claude/commands"
    state: directory

- name: Soft link Claude Code settings
  ansible.builtin.file:
    src: "{{ playbook_dir }}/files/claude-settings.json"
    dest: "{{ ansible_facts.env.HOME }}/.claude/settings.json"
    force: true
    state: link

- name: Find agent-config commands
  ansible.builtin.find:
    paths: "{{ playbook_dir }}/files/agent-config/commands"
    patterns: "*.md"
  register: agent_config_commands

- name: Soft link agent-config commands to Claude Code
  ansible.builtin.file:
    src: "{{ item.path }}"
    dest: "{{ ansible_facts.env.HOME }}/.claude/commands/{{ item.path | basename }}"
    force: true
    state: link
  loop: "{{ agent_config_commands.files }}"

- name: Add Linear MCP server to Claude Code (user scope)
  ansible.builtin.command:
    cmd: >
      claude mcp add linear https://mcp.linear.app/sse
      --transport sse
      --scope user
      --header "Authorization: Bearer ${LINEAR_API_KEY}"
  register: mcp_result
  changed_when: "'already exists' not in mcp_result.stderr"
  failed_when: false

- name: Install agent-browser skill for Claude Code
  ansible.builtin.command:
    cmd: npx skills add vercel-labs/agent-browser
  args:
    creates: "{{ ansible_facts.env.HOME }}/.claude/skills/agent-browser/SKILL.md"