---

- name: Install Claude Code CLI on MacOS
  ansible.builtin.package:
    name: claude-code
    state: present
  register: result
  failed_when:
    - '"already installed" not in result.msg'
    - '"Package installed" not in result.msg'
    - result.msg != ""
  when: ansible_facts.os_family == 'Darwin'

- name: "Ensure {{ ansible_facts.env.HOME }}/.claude exists"
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.claude"
    state: directory

- name: Gather Claude Code commands path info
  ansible.builtin.stat:
    path: "{{ ansible_facts.env.HOME }}/.claude/commands"
    follow: false
  register: claude_commands_path

- name: Backup existing Claude Code commands path before symlinking
  ansible.builtin.command:
    cmd: >
      mv
      "{{ ansible_facts.env.HOME }}/.claude/commands"
      "{{ ansible_facts.env.HOME }}/.claude/commands.pre-shared-link.{{ ansible_facts['date_time']['epoch'] }}"
  when:
    - claude_commands_path.stat.exists
    - not (claude_commands_path.stat.islnk | default(false))

- name: Gather Claude Code skills path info
  ansible.builtin.stat:
    path: "{{ ansible_facts.env.HOME }}/.claude/skills"
    follow: false
  register: claude_skills_path

- name: Backup existing Claude Code skills path before symlinking
  ansible.builtin.command:
    cmd: >
      mv
      "{{ ansible_facts.env.HOME }}/.claude/skills"
      "{{ ansible_facts.env.HOME }}/.claude/skills.pre-shared-link.{{ ansible_facts['date_time']['epoch'] }}"
  when:
    - claude_skills_path.stat.exists
    - not (claude_skills_path.stat.islnk | default(false))

- name: Soft link Claude Code settings
  ansible.builtin.file:
    src: "{{ playbook_dir }}/files/claude-settings.json"
    dest: "{{ ansible_facts.env.HOME }}/.claude/settings.json"
    force: true
    state: link

- name: Soft link AGENTS.md (single source of truth)
  ansible.builtin.file:
    src: "{{ playbook_dir }}/files/agent-config/AGENTS.md"
    dest: "{{ ansible_facts.env.HOME }}/.claude/AGENTS.md"
    force: true
    state: link

- name: Soft link CLAUDE.md (imports AGENTS.md)
  ansible.builtin.file:
    src: "{{ playbook_dir }}/files/agent-config/CLAUDE.md"
    dest: "{{ ansible_facts.env.HOME }}/.claude/CLAUDE.md"
    force: true
    state: link

- name: Soft link shared Claude Code commands directory
  ansible.builtin.file:
    src: "{{ playbook_dir }}/files/agent-config/commands"
    dest: "{{ ansible_facts.env.HOME }}/.claude/commands"
    force: true
    state: link

- name: Soft link shared Claude Code skills directory
  ansible.builtin.file:
    src: "{{ playbook_dir }}/files/agent-config/skills"
    dest: "{{ ansible_facts.env.HOME }}/.claude/skills"
    force: true
    state: link

- name: Add Linear MCP server to Claude Code (user scope)
  ansible.builtin.command:
    cmd: >
      claude mcp add linear https://mcp.linear.app/sse
      --transport sse
      --scope user
      --header "Authorization: Bearer ${LINEAR_API_KEY}"
  register: mcp_result
  changed_when: "'already exists' not in mcp_result.stderr"
  failed_when: false

- name: Install agent-browser skill globally
  ansible.builtin.command:
    cmd: npx skills add vercel-labs/agent-browser --yes --global
  args:
    creates: "{{ ansible_facts.env.HOME }}/.agents/skills/agent-browser/SKILL.md"
